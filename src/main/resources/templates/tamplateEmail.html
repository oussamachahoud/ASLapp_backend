<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Notification</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;
        }
        .container { line-height: 24px;, max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
        h2 { color: #333; }
        p { font-size: 16px; color: #555; }
        .footer { margin-top: 20px; font-size: 14px; color: #888; }

        .button {
            margin-left: auto;
            margin-right: auto;
            display: block;
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            width:200px;


        }
        .button:hover {
            background-color: #0056b3;
        }
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
<div class="container">
    <img id="background" src="https://c4.wallpaperflare.com/wallpaper/916/390/474/logo-mail-wallpaper-preview.jpg"/> <h2>Welcome, {{name}}!</h2>
    <p>Thank you for joining our platform. We are excited to have you on board!</p>
    <a href="http://localhost:8081/auth/verify?token={{JWT}}" class="button" id="center">Verify Your Email</a>
    <p class="footer">If you did not request this, please ignore this email.</p>
</div>
</body>
</html><!DOCTYPE html>
