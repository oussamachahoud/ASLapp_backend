version: "3.9"

services:



  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aslapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB:-aslapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aslapp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Application ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aslapp_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB & Redis hosts to point at the Docker service names
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8081"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
        # ── Angular Frontend ────────────────────────────────────────────────────────

  frontend:
    build:
      context: E:\ASLappfrontend
      dockerfile: Dockerfile
    container_name: aslapp_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
